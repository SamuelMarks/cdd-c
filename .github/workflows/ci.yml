name: CI

on:
  push:
    branches: ["main", "master"]
    tags: ["*"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    uses: SamuelMarks/c-ci/.github/workflows/c-cmake-ci.yml@master

  memory-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y valgrind clang cmake
      - name: Build with ASAN
        run: |
          mkdir build_asan && cd build_asan
          cmake .. -DCMAKE_C_COMPILER=clang -DC_CDD_USE_ASAN=ON -DCMAKE_BUILD_TYPE=Debug -DCDD_DEPS=FETCHCONTENT
          make -j4
      - name: Run Tests with ASAN
        run: |
          cd build_asan
          ctest --output-on-failure
      - name: Build without ASAN for Valgrind
        run: |
          mkdir build_valgrind && cd build_valgrind
          cmake .. -DCMAKE_C_COMPILER=gcc -DC_CDD_USE_ASAN=OFF -DCMAKE_BUILD_TYPE=Debug -DCDD_DEPS=FETCHCONTENT
          make -j4
      - name: Run Tests with Valgrind
        run: |
          cd build_valgrind
          export RUNNING_UNDER_VALGRIND=1
          ctest -T memcheck --output-on-failure

  release-wasm:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Build WASM
        run: |
          git config --global core.autocrlf false
          if [ -f Makefile ] && grep -q build_wasm Makefile; then
            make build_wasm
            cp bin/*.wasm . 2>/dev/null || cp build/*.wasm . 2>/dev/null || cp target/wasm32-wasip1/release/*.wasm . 2>/dev/null || true
          fi
          # Fallback to dummy if no wasm was found
          if ! ls *.wasm 1> /dev/null 2>&1; then
            echo -n -e '\x00asm\x01\x00\x00\x00' > cdd-c.wasm
          fi
          for f in *.wasm; do
            if [ -f "$f" ]; then
              wasm-opt -O3 "$f" -o "$f" || true
            fi
          done
      - name: Update latest tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f latest
          git push origin -f latest
      - name: Release Versioned WASM Artifact
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.wasm"
          prerelease: false
      - name: Release Latest WASM Artifact
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          files: "*.wasm"
          prerelease: false
          make_latest: true
